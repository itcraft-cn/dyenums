# Error Code Configuration File
# Format: ErrorCode.CODE=name|zh|en|pt|ru|order
# 
# This file demonstrates how to configure error codes with multi-language support.
# New error codes can be added by simply adding new entries to this file.
#
# Supported languages:
#   zh - Chinese (中文)
#   en - English
#   pt - Portuguese (Português)
#   ru - Russian (Русский)
#
# To add more languages, extend the format: name|zh|en|pt|ru|ja|ko|...|order

# Predefined error codes (err_00001 ~ err_00010)
ErrorCode.err_00001=系统错误|系统内部错误|System error|Erro do sistema|Системная ошибка|1
ErrorCode.err_00002=参数错误|参数验证失败|Invalid parameter|Parâmetro inválido|Неверный параметр|2
ErrorCode.err_00003=权限错误|无访问权限|Access denied|Acesso negado|Доступ запрещен|3
ErrorCode.err_00004=认证错误|认证失败|Authentication failed|Falha na autenticação|Ошибка аутентификации|4
ErrorCode.err_00005=数据错误|数据不存在|Data not found|Dados não encontrados|Данные не найдены|5
ErrorCode.err_00006=网络错误|网络连接失败|Network error|Erro de rede|Ошибка сети|6
ErrorCode.err_00007=超时错误|请求超时|Request timeout|Tempo limite esgotado|Тайм-аут запроса|7
ErrorCode.err_00008=限流错误|请求过于频繁|Rate limit exceeded|Limite de taxa excedido|Превышен лимит запросов|8
ErrorCode.err_00009=服务错误|服务不可用|Service unavailable|Serviço indisponível|Сервис недоступен|9
ErrorCode.err_00010=未知错误|未知错误|Unknown error|Erro desconhecido|Неизвестная ошибка|10

# Dynamic error codes - add new error codes below
# ErrorCode.err.10001=业务错误|业务处理失败|Business error|Erro de negócio|Ошибка бизнеса|100
# ErrorCode.err.10002=订单错误|订单不存在|Order not found|Pedido não encontrado|Заказ не найден|101

# Extended language support example (Japanese, Korean, Arabic)
# ErrorCode.err.20001=国际化错误|多语言支持|Multi-language|Multi-idioma|Многоязычный|日本語対応|한국어 지원|دعم متعدد اللغات|200